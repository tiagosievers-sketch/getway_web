<IfModule mod_ssl.c>
    <VirtualHost *:443>
            ServerAdmin pedro.araujo@merlioti.com.br
            ServerName gateway-hom.2easyinsurance.com
                SSLEngine on
                SSLCertificateFile      /etc/certificate/www_2easyinsurance_com_903592956.crt
                SSLCertificateKeyFile /etc/certificate/www_2easyinsurance_com_903592956.key
                SSLCertificateChainFile /etc/certificate/DigiCertCA.crt
            DocumentRoot /var/www/html/public
            <Directory /var/www/html>
                AllowOverride All
                Require all granted
            </Directory>
            ErrorLog ${APACHE_LOG_DIR}/error.log
            CustomLog ${APACHE_LOG_DIR}/access.log combined
    </VirtualHost>
</IfModule>
